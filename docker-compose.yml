services:
  db:
    image: postgres:17
    container_name: seo_crawler_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: seo_pass
      POSTGRES_DB: seo_crawler
    ports:
      - "127.0.0.1:55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo_user -d seo_crawler"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - seo_crawler_pgdata_v17:/var/lib/postgresql/data

volumes:
  seo_crawler_pgdata_v17:
