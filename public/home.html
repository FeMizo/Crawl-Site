<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Crawler - Inicio</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon-seo-crawler.svg">
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(79, 151, 255, .18), transparent 55%),
        radial-gradient(800px 500px at 90% 120%, rgba(0, 255, 136, .14), transparent 58%),
        var(--bg);
      font-family: "Manrope", sans-serif;
    }

    .home-card {
      width: min(880px, calc(100% - 36px));
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .35);
      padding: 28px 26px;
    }

    .home-title {
      margin: 0 0 8px;
      font-family: "Syne", sans-serif;
      font-size: clamp(1.7rem, 2.8vw, 2.4rem);
      letter-spacing: .2px;
    }

    .home-sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: .95rem;
    }

    .home-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .home-input {
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }

    .home-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(79, 151, 255, .2);
    }

    .home-btn {
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid rgba(89, 170, 255, .55);
      background: linear-gradient(135deg, #4f97ff 0%, #6eb2ff 100%);
      color: #061425;
      font-weight: 800;
      padding: 0 18px;
      cursor: pointer;
    }

    .home-btn:hover {
      filter: brightness(1.03);
    }

    .home-link {
      margin-top: 12px;
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
    }

    .home-link:hover {
      color: var(--text2);
    }

    @media (max-width: 640px) {
      .home-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="home-card" aria-label="Inicio SEO Crawler">
    <h1 class="home-title">SEO Crawler</h1>
    <p class="home-sub">Ingresa una URL para iniciar el análisis y abrir el dashboard.</p>
    <div class="home-row">
      <input
        id="homeUrlInput"
        class="home-input"
        type="url"
        inputmode="url"
        placeholder="https://www.tu-sitio.com"
        autocomplete="off"
        spellcheck="false"
        aria-label="URL a analizar">
      <button id="homeCrawlBtn" class="home-btn" type="button">Iniciar Crawl</button>
    </div>
    <a class="home-link" href="/dashboard">Ir al dashboard</a>
  </main>

  <script>
    (function () {
      const input = document.getElementById("homeUrlInput");
      const btn = document.getElementById("homeCrawlBtn");

      function normalizeUrl(value) {
        const v = (value || "").trim();
        if (!v) return "";
        const withProtocol = /^https?:\/\//i.test(v) ? v : `https://${v}`;
        try {
          return new URL(withProtocol).toString();
        } catch {
          return "";
        }
      }

      function goDashboard() {
        const normalized = normalizeUrl(input.value);
        if (!normalized) {
          input.focus();
          return;
        }
        const q = new URLSearchParams({ url: normalized, autostart: "1" });
        window.location.href = `/dashboard?${q.toString()}`;
      }

      btn.addEventListener("click", goDashboard);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") goDashboard();
      });
    })();
  </script>
</body>
</html>
